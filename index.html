<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>코렛트 벽킬내기 점수판</title>
    <style>
        :root {
            --ow-orange: #f06414;
            --bg-body: #280150;
            --bg-panel: rgba(30, 33, 38, 0.9);
            --border-color: #383e47;
        }
        body { 
            font-family: 'Malgun Gothic', 'Pretendard', sans-serif; 
            background-color: var(--bg-body); 
            min-height: 100vh;
            color: white; 
            padding: 20px; 
            margin: 0; 
            overflow-x: hidden;
        }
        .container { max-width: 1200px; margin: 0 auto; position: relative; }
        
        .box { background: var(--bg-panel); padding: 20px; margin-bottom: 20px; border-radius: 12px; border: 1px solid var(--border-color); box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        h2 { margin-top: 0; color: #fff; border-bottom: 2px solid var(--border-color); padding-bottom: 10px; text-shadow: 1px 1px 3px rgba(0,0,0,0.5); display: inline-block; cursor: pointer; transition: color 0.2s; }
        h2:hover { color: var(--ow-orange); }
        h3 { margin-top: 0; color: var(--ow-orange); }
        input, select { padding: 10px; margin: 5px; background: #121417; border: 1px solid var(--border-color); color: white; border-radius: 6px; }
        button { padding: 10px 20px; margin: 5px; background: #3498db; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        button:hover { background: #2980b9; }
        .btn-start { background: var(--ow-orange); font-size: 1.1rem; width: 100%; margin-top: 15px; }
        
        .setup-grid { display: grid; grid-template-columns: 1fr 2fr; gap: 20px; }
        .input-group { display: flex; align-items: center; gap: 5px; }
        #waitingPool { min-height: 60px; background: rgba(18, 20, 23, 0.8); border: 1px dashed #555; border-radius: 8px; padding: 10px; display: flex; flex-wrap: wrap; gap: 8px; }
        
        .player-tag { background: #ffffff; color: #000; padding: 6px 14px; border-radius: 5px; font-weight: bold; cursor: grab; display: inline-flex; align-items: center; box-shadow: 0 3px 5px rgba(0,0,0,0.3); }
        .remove-btn { color: #ff4d4d; font-size: 0.85rem; cursor: pointer; margin-left: 8px; }
        
        .teams-container { display: flex; flex-wrap: wrap; gap: 15px; margin-top: 20px; justify-content: center; }
        .team-card { background: rgba(42, 46, 53, 0.9); border-radius: 10px; padding: 15px; width: 250px; border-top: 6px solid #3498db; min-height: 150px; display: flex; flex-direction: column; }
        .team-title { text-align: center; font-weight: bold; font-size: 1.2rem; margin-bottom: 15px; color: #fff; }
        .team-dropzone { flex-grow: 1; background: rgba(18, 20, 23, 0.6); border: 1px dashed #444; border-radius: 8px; padding: 10px; display: flex; flex-direction: column; gap: 8px; }

        .score-board { display: flex; justify-content: center; flex-wrap: wrap; gap: 20px; margin-top: 20px; }
        .live-team-card { position: relative; background: rgba(34, 34, 34, 0.95); padding: 20px; width: 280px; text-align: center; border-radius: 10px; border-top: 8px solid #f1c40f; box-shadow: 0 5px 15px rgba(0,0,0,0.5); overflow: hidden; }
        .live-team-card h4 { margin: 0 0 10px 0; font-size: 1.3rem; }
        .live-team-card h2 { color: #f1c40f; font-size: 2.5rem; margin: 10px 0; border: none; padding: 0; }
        
        .player-stats-row { display: flex; justify-content: space-between; border-bottom: 1px solid #444; padding: 6px 0; font-size: 0.9rem; color: #ccc; }
        .player-stats-row:last-child { border-bottom: none; }
        .player-stats-name { font-weight: bold; color: #fff; }
        .player-stats-score { color: #f06414; font-weight: bold; }
        
        .chicken-bonus-text { font-size: 0.9rem; color: #f1c40f; font-weight: bold; margin-top: 10px; padding-top: 10px; border-top: 1px dashed #555; display: block; text-align: center; }

        .status { color: #00ff00; font-weight: bold; font-size: 1.2rem; }
        .failed { color: #ff3333; font-weight: bold; font-size: 1.2rem; }
        .config-row { display: flex; flex-wrap: wrap; gap: 15px; align-items: center; }
        
        .total-score-panel { background: #f06414; padding: 10px 20px; border-radius: 8px; text-align: center; box-shadow: 0 4px 10px rgba(240, 100, 20, 0.3); }
        .total-score-label { font-size: 0.85rem; color: #ffe0cc; display: block; font-weight: bold; }
        .total-score-value { font-size: 2rem; font-weight: 900; color: #fff; margin-top: 2px; }

        /* 플로팅 오버레이 스타일 */
        #floatingOverlay {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 580px;
            background: #121417;
            border: 2px solid var(--ow-orange);
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            z-index: 9999;
            display: none;
            flex-direction: column;
            overflow: hidden;
            resize: both; /* 창 크기 조절 가능 */
            min-width: 320px;
            min-height: 200px;
            max-height: 90vh;
        }
        
        #overlayHeader {
            background: #2a2e35;
            padding: 10px;
            cursor: move;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #444;
            user-select: none;
        }
        
        #overlayHeaderTitle {
            font-weight: bold;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #closeOverlayBtn {
            background: transparent;
            color: #aaa;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 0;
            margin: 0;
        }
        #closeOverlayBtn:hover { color: #fff; }

        #overlayContentArea {
            padding: 15px;
            overflow-y: auto;
            flex-grow: 1;
            position: relative;
        }

        /* 오버레이 내부 전용 클래스 (기존 PiP 디자인 재사용) */
        .overlay-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; align-items: start; }
        .overlay-team-card { position: relative; background: rgba(34, 34, 34, 0.95); padding: 15px; text-align: center; border-radius: 10px; border-top: 6px solid #f1c40f; box-shadow: 0 4px 10px rgba(0,0,0,0.5); display: flex; flex-direction: column; }
        .overlay-team-title { font-size: 1.1rem; font-weight: bold; color: #fff; margin: 0 0 5px 0; }
        .overlay-team-score { color: #f1c40f; font-size: 1.8rem; font-weight: bold; margin: 5px 0 10px 0; line-height: 1; }
        .overlay-player-list { background: rgba(26, 28, 32, 0.8); border-radius: 6px; padding: 8px; text-align: left; }
        .overlay-player-row { display: flex; justify-content: space-between; border-bottom: 1px solid #444; padding: 4px 0; font-size: 0.8rem; color: #ccc; }
        .overlay-player-row:last-child { border-bottom: none; }
        .overlay-player-name { font-weight: bold; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 80px; }
        .overlay-player-stats { color: #aaa; }
        .overlay-player-pts { color: #f06414; font-weight: bold; }
        .overlay-chicken { font-size: 0.8rem; color: #f1c40f; font-weight: bold; margin-top: 5px; padding-top: 5px; border-top: 1px dashed #555; text-align: center; }

        .overlay-end-msg { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: center; font-size: 2.2rem; font-weight: 900; color: #ff3333; text-shadow: 0 0 10px rgba(255, 51, 51, 0.5); z-index: 100; flex-direction: column; text-align: center; border-radius: 10px; }
        .overlay-end-msg.success { color: #00ff00; text-shadow: 0 0 10px rgba(0, 255, 0, 0.5); }
        .overlay-end-msg span { font-size: 1rem; color: #ccc; margin-bottom: 10px; font-weight: normal; text-shadow: none; }

        @keyframes popFadeOverlay {
            0% { transform: scale(0.5); opacity: 0; }
            10% { transform: scale(1.1); opacity: 1; pointer-events: auto; }
            20% { transform: scale(1); opacity: 1; pointer-events: auto; }
            80% { transform: scale(1); opacity: 1; pointer-events: auto; }
            100% { transform: scale(0.9); opacity: 0; pointer-events: none; display: none; }
        }
        .overlay-update-anim {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            border-radius: 10px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            animation: popFadeOverlay 5s forwards;
            z-index: 10;
        }
        .overlay-rank { font-size: 2.5rem; color: #f1c40f; font-weight: 900; text-shadow: 0 0 10px rgba(241, 196, 15, 0.8); margin-bottom: 2px; line-height: 1; }
        .overlay-diff { font-size: 1.5rem; color: #2ecc71; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h2 onclick="resetToSetup()" title="클릭 시 설정 화면으로 돌아갑니다">코렛트 벽킬내기</h2>
        
        <div id="builderSection">
            <div class="setup-grid">
                <div class="box">
                    <h3>1. 인원 추가 및 팀 수</h3>
                    <div class="input-group">
                        <label>팀 수:</label>
                        <select id="teamCountSelect" onchange="renderTeamBoards()">
                            <option value="1">1팀</option>
                            <option value="2">2팀</option>
                            <option value="3">3팀</option>
                            <option value="4" selected>4팀</option>
                            <option value="5">5팀</option>
                            <option value="6">6팀</option>
                            <option value="7">7팀</option>
                            <option value="8">8팀</option>
                        </select>
                    </div>
                    <div class="input-group" style="margin-top: 10px;">
                        <input type="text" id="streamerInput" placeholder="배그 닉네임 (쉼표로 구분)" style="flex-grow: 1;" onkeypress="if(event.key==='Enter') addStreamers()">
                        <button onclick="addStreamers()">추가</button>
                    </div>
                    <div style="font-size: 0.8rem; color: #aaa; margin-top: 5px;">* Firebase 연동 시 배그 닉네임이 숲(SOOP) 닉네임으로 표기됩니다.</div>
                </div>
                
                <div class="box">
                    <h3>2. 대기실 (드래그하여 팀에 배치하세요)</h3>
                    <div id="waitingPool" ondrop="drop(event)" ondragover="allowDrop(event)">
                    </div>
                </div>
            </div>

            <div class="box">
                <h3>3. 팀 배치 <span style="font-size:0.8rem; color:#ccc; font-weight:normal;">(각 팀의 최상단 닉네임이 해당 팀의 API 검색 기준이 됩니다.)</span></h3>
                <div class="teams-container" id="teamsContainer">
                </div>
            </div>

            <div class="box">
                <h3>4. 점수판 룰 설정</h3>
                <div class="config-row">
                    <label>킬 점수: <input type="number" id="killScore" value="1" style="width: 60px;"></label>
                    <label>데스 감점: <input type="number" id="deathPenalty" value="1" style="width: 60px;"></label>
                    <label>목표 점수: <input type="number" id="targetScore" value="100" style="width: 80px;"></label>
                    <label>종료 시간: <input type="time" id="endTime"></label>
                </div>
                <div class="config-row" style="margin-top: 10px; border-top: 1px solid #555; padding-top: 10px;">
                    <span style="font-size: 0.9rem; color: #ddd; font-weight: bold;"> 🍗 치킨 점수 설정:</span>
                    <label>에/미/태/데/론/비: <input type="number" id="chickenA" value="20" style="width: 60px;" title="에란겔, 미라마, 테이고, 데스턴, 론도, 비켄디"></label>
                    <label>사/카/파: <input type="number" id="chickenB" value="15" style="width: 60px;" title="사녹, 카라킨, 파라모"></label>
                </div>
                <button class="btn-start" onclick="startGame()">🚀 팀 확정 및 대회 시작</button>
            </div>
        </div>

        <div class="box" id="matchSection" style="display:none;">
            <div style="display: flex; justify-content: space-between; align-items: flex-end; border-bottom: 1px solid #555; padding-bottom: 15px; margin-bottom: 15px;">
                <div>
                    <h3 style="margin-bottom: 5px;">진행 상황 <span id="clock" style="font-size: 1rem; color:#ffcc00; margin-left: 10px;"></span></h3>
                    <p id="systemMsg" style="margin: 0; font-size: 1.1rem; color: #ccc;">초기화 중...</p>
                </div>
                <div class="total-score-panel">
                    <span class="total-score-label">전체 팀 합계 점수</span>
                    <div class="total-score-value" id="totalScoreDisp">TOTAL 0</div>
                </div>
            </div>
            
            <div class="score-board" id="scoreBoard">
            </div>
            
            <div style="text-align: center; margin-top: 30px;">
                <button style="background: #9b59b6; margin-right: 10px;" onclick="toggleOverlay()">🪟 오버레이 띄우기 / 닫기</button>
                <button style="background: #e74c3c;" onclick="resetToSetup()">🛑 설정 화면으로 돌아가기 (초기화)</button>
            </div>
        </div>
    </div>

    <div id="floatingOverlay">
        <div id="overlayHeader">
            <div id="overlayHeaderTitle">
                <span>☰</span> PUBG 실시간 점수판
            </div>
            <button id="closeOverlayBtn" onclick="toggleOverlay()">✕</button>
        </div>
        <div id="overlayContentArea">
            </div>
    </div>

    <script>
        const BACKEND_URL = "https://pubg-score-board.vercel.app/api"; 
        const FIREBASE_DB_URL = "https://본인프로젝트-default-rtdb.firebaseio.com/streamerMap.json";
        
        let streamerNameMapping = {}; 

        let teamsData = []; 
        let config = {};
        let pollingTimer, clockTimer;
        let isGameFinished = false;
        let gameEndReason = ""; 
        let msgTimeout;
        let isFirstSync = true;

        const mapGroups = {
            groupA: ['Baltic_Main', 'Desert_Main', 'Tiger_Main', 'Kiki_Main', 'Neon_Main', 'DihorOtok_Main'],
            groupB: ['Savage_Main', 'Summerland_Main', 'Chimera_Main']
        };

        window.onload = function() {
            loadFirebaseMapping();
            renderTeamBoards();
            initDraggableOverlay();
        };

        // 오버레이 창 드래그 기능 설정
        function initDraggableOverlay() {
            const overlay = document.getElementById('floatingOverlay');
            const header = document.getElementById('overlayHeader');
            let isDragging = false;
            let offsetX, offsetY;

            header.addEventListener('mousedown', (e) => {
                isDragging = true;
                const rect = overlay.getBoundingClientRect();
                offsetX = e.clientX - rect.left;
                offsetY = e.clientY - rect.top;
            });

            document.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                
                let newLeft = e.clientX - offsetX;
                let newTop = e.clientY - offsetY;
                
                // 화면 밖으로 나가지 않도록 제한(선택사항)
                const winWidth = window.innerWidth;
                const winHeight = window.innerHeight;
                const rect = overlay.getBoundingClientRect();
                
                if (newLeft < 0) newLeft = 0;
                if (newTop < 0) newTop = 0;
                if (newLeft + rect.width > winWidth) newLeft = winWidth - rect.width;
                if (newTop + rect.height > winHeight) newTop = winHeight - rect.height;

                overlay.style.left = `${newLeft}px`;
                overlay.style.top = `${newTop}px`;
                overlay.style.bottom = 'auto'; // 하단 기준 앵커 해제
                overlay.style.right = 'auto';  // 우측 기준 앵커 해제
            });

            document.addEventListener('mouseup', () => {
                isDragging = false;
            });
        }

        async function loadFirebaseMapping() {
            if(FIREBASE_DB_URL.includes("본인프로젝트")) return; 
            try {
                const res = await fetch(FIREBASE_DB_URL);
                const data = await res.json();
                if (data) {
                    streamerNameMapping = data;
                }
            } catch (e) {
                console.error("Firebase 로드 실패", e);
            }
        }

        function resetToSetup() {
            clearInterval(pollingTimer);
            clearInterval(clockTimer);
            clearTimeout(msgTimeout);
            
            isGameFinished = false;
            teamsData = [];
            gameEndReason = "";
            
            document.getElementById('floatingOverlay').style.display = 'none';
            
            document.getElementById('matchSection').style.display = 'none';
            document.getElementById('builderSection').style.display = 'block';
            
            document.getElementById('systemMsg').innerHTML = "초기화 중...";
            document.getElementById('totalScoreDisp').innerText = "TOTAL 0";
            document.getElementById('scoreBoard').innerHTML = "";
            document.getElementById('overlayContentArea').innerHTML = "";
        }

        function addStreamers() {
            const inputEl = document.getElementById('streamerInput');
            const names = inputEl.value.split(',').map(n => n.trim()).filter(n => n !== "");
            const pool = document.getElementById('waitingPool');
            
            names.forEach(pubgName => {
                const soopName = streamerNameMapping[pubgName] || pubgName;

                const tag = document.createElement('div');
                tag.className = 'player-tag';
                tag.dataset.pubg = pubgName; 
                tag.id = 'player-' + Math.random().toString(36).substr(2, 9);
                tag.draggable = true;
                tag.ondragstart = drag;
                tag.innerHTML = `<span class="name-text">${soopName}</span><span class="remove-btn" onclick="this.parentElement.remove()">✕</span>`;
                pool.appendChild(tag);
            });
            inputEl.value = '';
        }

        function renderTeamBoards() {
            const count = parseInt(document.getElementById('teamCountSelect').value);
            const container = document.getElementById('teamsContainer');
            
            document.querySelectorAll('.team-dropzone .player-tag').forEach(tag => {
                document.getElementById('waitingPool').appendChild(tag);
            });

            container.innerHTML = "";
            for (let i = 1; i <= count; i++) {
                const card = document.createElement('div');
                card.className = 'team-card';
                card.innerHTML = `
                    <div class="team-title">TEAM ${i}</div>
                    <div class="team-dropzone" id="teamDrop-${i}" ondrop="drop(event)" ondragover="allowDrop(event)">
                    </div>
                `;
                container.appendChild(card);
            }
        }

        function allowDrop(ev) { ev.preventDefault(); }
        function drag(ev) { ev.dataTransfer.setData("text", ev.target.id); }
        function drop(ev) {
            ev.preventDefault();
            const data = ev.dataTransfer.getData("text");
            const draggedElement = document.getElementById(data);
            let target = ev.target;
            while (target && !target.classList.contains('team-dropzone') && target.id !== 'waitingPool') {
                target = target.parentElement;
            }
            if (target && draggedElement) {
                target.appendChild(draggedElement);
            }
        }

        function startGame() {
            teamsData = [];
            const dropzones = document.querySelectorAll('.team-dropzone');
            
            dropzones.forEach((zone, index) => {
                const tags = Array.from(zone.querySelectorAll('.player-tag'));
                if (tags.length > 0) {
                    teamsData.push({
                        id: index + 1,
                        name: `TEAM ${index + 1}`,
                        repPlayer: tags[0].dataset.pubg, 
                        lastMatchId: "", 
                        players: tags.map(tag => ({ 
                            pubgName: tag.dataset.pubg, 
                            soopName: tag.querySelector('.name-text').innerText, 
                            kills: 0, deaths: 0, score: 0 
                        })),
                        chickenCount: 0,
                        chickenBonusTotal: 0,
                        score: 0,
                        latestUpdate: null
                    });
                }
            });

            if (teamsData.length === 0) {
                alert("배치된 팀원이 없습니다. 팀을 먼저 구성해주세요!");
                return;
            }

            config = {
                killScore: parseInt(document.getElementById('killScore').value),
                deathPenalty: parseInt(document.getElementById('deathPenalty').value),
                targetScore: parseInt(document.getElementById('targetScore').value),
                endTime: document.getElementById('endTime').value,
                chickenA: parseInt(document.getElementById('chickenA').value),
                chickenB: parseInt(document.getElementById('chickenB').value)
            };

            if (!config.endTime) {
                alert("종료 시간을 입력해주세요.");
                return;
            }

            document.getElementById('builderSection').style.display = 'none';
            document.getElementById('matchSection').style.display = 'block';
            
            isFirstSync = true;
            document.getElementById('systemMsg').innerHTML = `🔄 현재 시점의 기준 전적을 설정 중입니다...`;
            
            renderLiveScoreBoard();
            clockTimer = setInterval(checkTimeLimit, 1000);
            
            fetchData(); 
            pollingTimer = setInterval(fetchData, 30000); 
        }

        function checkTimeLimit() {
            if (isGameFinished) return;
            const now = new Date();
            const currentTimeStr = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
            document.getElementById('clock').innerText = "현재 시간: " + currentTimeStr + " / 종료 시간: " + config.endTime;

            if (currentTimeStr >= config.endTime) {
                endGame(false);
            }
            renderLiveScoreBoard();
        }

        function showTemporaryMessage(msg) {
            const msgEl = document.getElementById('systemMsg');
            msgEl.innerHTML = `<span style="color:#f1c40f; font-weight:bold;">${msg}</span>`;
            
            clearTimeout(msgTimeout);
            msgTimeout = setTimeout(() => {
                if (!isGameFinished) {
                    msgEl.innerHTML = "데이터 갱신 대기 중...";
                }
            }, 5000);
        }

        async function fetchData() {
            if (isGameFinished) return;
            let updatedTeams = [];
            let fetchedAny = false;

            for (let team of teamsData) {
                if (!team.repPlayer) continue;
                try {
                    const res = await fetch(`${BACKEND_URL}?player=${team.repPlayer}&lastMatch=${team.lastMatchId}`);
                    const data = await res.json();
                    
                    fetchedAny = true;

                    if (isFirstSync) {
                        team.lastMatchId = data.matchId || ""; 
                    } 
                    else if (data.status === "new_match") {
                        team.lastMatchId = data.matchId;
                        const matchMap = data.map || ""; 
                        calculateScores(team, data.stats, matchMap);
                        updatedTeams.push(team.name);
                    }
                } catch (error) { console.error(error); }
            }

            if (isFirstSync && fetchedAny) {
                isFirstSync = false;
                document.getElementById('systemMsg').innerHTML = `<span style="color:#00ff00;">✅ 기준 전적 수집 완료. 새로운 전적을 대기합니다.</span>`;
            } else if (!isFirstSync && updatedTeams.length > 0) {
                showTemporaryMessage(`${updatedTeams.join(', ')} 의 매치 종료! 최신 점수를 반영했습니다.`);
            }
        }

        function calculateScores(team, stats, matchMap) {
            let teamWonMatch = false;
            let teamBestRank = 99;
            let oldTotalScore = team.score;

            team.players.forEach(playerObj => {
                const matchedKey = Object.keys(stats).find(key => key.toLowerCase() === playerObj.pubgName.toLowerCase());
                if (matchedKey) {
                    const s = stats[matchedKey];
                    const earned = (s.kills * config.killScore) - (s.deaths * config.deathPenalty);
                    
                    if (s.winPlace && s.winPlace < teamBestRank) teamBestRank = s.winPlace;

                    playerObj.kills += s.kills;
                    playerObj.deaths += s.deaths;
                    playerObj.score += earned;
                    team.score += earned;
                    if (s.isWinner) teamWonMatch = true;
                }
            });

            if (teamWonMatch) {
                team.chickenCount += 1;
                let chickenBonus = mapGroups.groupB.includes(matchMap) ? config.chickenB : config.chickenA;
                team.chickenBonusTotal += chickenBonus;
                team.score += chickenBonus;
            }

            let scoreDiff = team.score - oldTotalScore;
            team.latestUpdate = { rank: teamBestRank, diff: scoreDiff, timestamp: Date.now() };

            renderLiveScoreBoard();
            checkTargetScore();
        }

        function checkTargetScore() {
            const total = teamsData.reduce((sum, t) => sum + t.score, 0);
            if (total >= config.targetScore) {
                endGame(true);
            }
        }

        function endGame(isSuccess) {
            isGameFinished = true;
            gameEndReason = isSuccess ? "목표 점수 성공" : "시간 종료"; 
            
            clearInterval(pollingTimer);
            clearInterval(clockTimer);
            clearTimeout(msgTimeout);
            
            const msgEl = document.getElementById('systemMsg');
            if (isSuccess) {
                msgEl.innerHTML = `<span class="status">🎉 성공! 목표 합계 점수를 달성했습니다!</span>`;
            } else {
                msgEl.innerHTML = `<span class="failed">⏰ 시간 종료! 목표 점수에 도달하지 못했습니다.</span>`;
            }
            
            renderLiveScoreBoard(); 
        }

        function toggleOverlay() {
            const overlay = document.getElementById('floatingOverlay');
            if (overlay.style.display === 'none' || overlay.style.display === '') {
                // 팀 수에 따라 오버레이 높이 조절
                let overlayHeight = 600;
                if (teamsData.length <= 2) overlayHeight = 380;
                
                overlay.style.height = `${overlayHeight}px`;
                overlay.style.display = 'flex';
                renderLiveScoreBoard();
            } else {
                overlay.style.display = 'none';
            }
        }

        function renderLiveScoreBoard() {
            const board = document.getElementById('scoreBoard');
            const overlayContentArea = document.getElementById('overlayContentArea');
            
            const clockText = document.getElementById('clock').innerText;
            let generatedHtmlMain = "";
            let generatedHtmlOverlay = "";
            let totalMatchScore = 0;

            teamsData.forEach(team => {
                totalMatchScore += team.score;
                
                // === 메인 & 오버레이 공통 플레이어 HTML 생성 ===
                let playersHtmlMain = team.players.map(p => `
                    <div class="player-stats-row">
                        <span class="player-stats-name">${p.soopName}</span>
                        <span>${p.kills}K / ${p.deaths}D <span class="player-stats-score">(${p.score}점)</span></span>
                    </div>
                `).join('');

                let playersHtmlOverlay = team.players.map(p => `
                    <div class="overlay-player-row">
                        <span class="overlay-player-name">${p.soopName}</span>
                        <span class="overlay-player-stats">${p.kills}K / ${p.deaths}D <span class="overlay-player-pts">(${p.score}점)</span></span>
                    </div>
                `).join('');
                
                let chickenHtmlMain = `<span class="chicken-bonus-text">총 ${team.chickenCount}치킨 (보너스: ${team.chickenBonusTotal}점)</span>`;
                let chickenHtmlOverlay = `<div class="overlay-chicken">총 ${team.chickenCount}치킨 (보너스: ${team.chickenBonusTotal}점)</div>`;
                
                let animOverlayMain = "";
                let animOverlayFloating = "";

                if (team.latestUpdate && (Date.now() - team.latestUpdate.timestamp < 5000)) {
                    let sign = team.latestUpdate.diff >= 0 ? "+" : "";
                    let diffColor = team.latestUpdate.diff >= 0 ? "#2ecc71" : "#e74c3c";
                    
                    animOverlayMain = `
                        <div class="overlay-update-anim" style="border-radius: 10px;">
                            <div class="overlay-rank">${team.latestUpdate.rank}등!</div>
                            <div class="overlay-diff" style="color: ${diffColor};">${sign}${team.latestUpdate.diff}점</div>
                        </div>
                    `;
                    animOverlayFloating = `
                        <div class="overlay-update-anim" style="border-radius: 10px;">
                            <div class="overlay-rank">${team.latestUpdate.rank}등!</div>
                            <div class="overlay-diff" style="color: ${diffColor};">${sign}${team.latestUpdate.diff}점</div>
                        </div>
                    `;
                }

                generatedHtmlMain += `
                    <div class="live-team-card">
                        ${animOverlayMain}
                        <h4>${team.name}</h4>
                        <h2>${team.score} 점</h2>
                        <div style="margin-top: 15px; text-align: left; background: rgba(26, 28, 32, 0.8); padding: 10px; border-radius: 8px;">
                            ${playersHtmlMain}
                            ${chickenHtmlMain}
                        </div>
                    </div>
                `;

                generatedHtmlOverlay += `
                    <div class="overlay-team-card">
                        ${animOverlayFloating}
                        <div class="overlay-team-title">${team.name}</div>
                        <div class="overlay-team-score">${team.score} 점</div>
                        <div class="overlay-player-list">
                            ${playersHtmlOverlay}
                            ${chickenHtmlOverlay}
                        </div>
                    </div>
                `;
            });

            // 1. 메인 화면 업데이트
            board.innerHTML = generatedHtmlMain;
            document.getElementById('totalScoreDisp').innerText = `TOTAL ${totalMatchScore}`;

            // 2. 오버레이 화면 업데이트
            if (document.getElementById('floatingOverlay').style.display !== 'none') {
                let endOverlay = "";
                if (isGameFinished) {
                    const successClass = gameEndReason === "목표 점수 성공" ? "success" : "";
                    const timeOnly = clockText.split('/').map(t => t.trim()).join(' / ');
                    
                    endOverlay = `
                        <div class="overlay-end-msg ${successClass}">
                            <div style="font-size: 2.8rem; color: #f1c40f; font-weight: 900; margin-bottom: 15px; text-shadow: 0 0 15px rgba(241,196,15,0.8);">TOTAL ${totalMatchScore}점</div>
                            <span>[ ${timeOnly} ]</span>
                            ${gameEndReason}
                        </div>
                    `;
                }

                overlayContentArea.innerHTML = `
                    <div style="text-align: center; margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px solid #333;">
                        <div style="font-size: 0.8rem; color: #ffcc00; margin-bottom: 5px;">${clockText}</div>
                        <div style="font-size: 1.8rem; font-weight: 900; color: #f06414;">TOTAL ${totalMatchScore}</div>
                    </div>
                    <div class="overlay-grid">
                        ${generatedHtmlOverlay}
                    </div>
                    ${endOverlay}
                `;
            }
        }
    </script>
</body>
</html>
