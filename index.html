<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>코렛트 벽킬내기</title>
    <style>
        :root {
            --ow-orange: #f06414;
            --bg-body: #121417;
            --bg-panel: #1e2126;
            --border-color: #383e47;
        }
        body { font-family: 'Malgun Gothic', 'Pretendard', sans-serif; background: var(--bg-body); color: white; padding: 20px; margin: 0; }
        .container { max-width: 1200px; margin: 0 auto; }
        
        .box { background: var(--bg-panel); padding: 20px; margin-bottom: 20px; border-radius: 12px; border: 1px solid var(--border-color); }
        h2 { margin-top: 0; color: #fff; border-bottom: 2px solid var(--border-color); padding-bottom: 10px; }
        h3 { margin-top: 0; color: var(--ow-orange); }
        input, select { padding: 10px; margin: 5px; background: #121417; border: 1px solid var(--border-color); color: white; border-radius: 6px; }
        button { padding: 10px 20px; margin: 5px; background: #3498db; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        button:hover { background: #2980b9; }
        .btn-start { background: var(--ow-orange); font-size: 1.1rem; width: 100%; margin-top: 15px; }
        
        .setup-grid { display: grid; grid-template-columns: 1fr 2fr; gap: 20px; }
        .input-group { display: flex; align-items: center; gap: 5px; }
        #waitingPool { min-height: 60px; background: #121417; border: 1px dashed #555; border-radius: 8px; padding: 10px; display: flex; flex-wrap: wrap; gap: 8px; }
        
        .player-tag { background: #ffffff; color: #000; padding: 6px 14px; border-radius: 5px; font-weight: bold; cursor: grab; display: inline-flex; align-items: center; box-shadow: 0 3px 5px rgba(0,0,0,0.3); }
        .remove-btn { color: #ff4d4d; font-size: 0.85rem; cursor: pointer; margin-left: 8px; }
        
        .teams-container { display: flex; flex-wrap: wrap; gap: 15px; margin-top: 20px; justify-content: center; }
        .team-card { background: #2a2e35; border-radius: 10px; padding: 15px; width: 250px; border-top: 6px solid #3498db; min-height: 150px; display: flex; flex-direction: column; }
        .team-title { text-align: center; font-weight: bold; font-size: 1.2rem; margin-bottom: 15px; color: #fff; }
        .team-dropzone { flex-grow: 1; background: #121417; border: 1px dashed #444; border-radius: 8px; padding: 10px; display: flex; flex-direction: column; gap: 8px; }

        .score-board { display: flex; justify-content: center; flex-wrap: wrap; gap: 20px; margin-top: 20px; }
        .live-team-card { position: relative; background: #222; padding: 20px; width: 280px; text-align: center; border-radius: 10px; border-top: 8px solid #f1c40f; box-shadow: 0 5px 15px rgba(0,0,0,0.5); overflow: hidden; }
        .live-team-card h4 { margin: 0 0 10px 0; font-size: 1.3rem; }
        .live-team-card h2 { color: #f1c40f; font-size: 2.5rem; margin: 10px 0; border: none; padding: 0; }
        
        .player-stats-row { display: flex; justify-content: space-between; border-bottom: 1px solid #444; padding: 6px 0; font-size: 0.9rem; color: #ccc; }
        .player-stats-row:last-child { border-bottom: none; }
        .player-stats-name { font-weight: bold; color: #fff; }
        .player-stats-score { color: #f06414; font-weight: bold; }
        
        /* 치킨 카운트 스타일 */
        .chicken-bonus-text { font-size: 0.9rem; color: #f1c40f; font-weight: bold; margin-top: 10px; padding-top: 10px; border-top: 1px dashed #555; display: block; text-align: center; }

        .status { color: #00ff00; font-weight: bold; font-size: 1.2rem; }
        .failed { color: #ff3333; font-weight: bold; font-size: 1.2rem; }
        .config-row { display: flex; flex-wrap: wrap; gap: 15px; align-items: center; }
        
        .total-score-panel { background: #f06414; padding: 10px 20px; border-radius: 8px; text-align: center; box-shadow: 0 4px 10px rgba(240, 100, 20, 0.3); }
        .total-score-label { font-size: 0.85rem; color: #ffe0cc; display: block; font-weight: bold; }
        .total-score-value { font-size: 2rem; font-weight: 900; color: #fff; margin-top: 2px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>코렛트 벽킬내기</h2>
        
        <div id="builderSection">
            <div class="setup-grid">
                <div class="box">
                    <h3>1. 인원 추가 및 팀 수</h3>
                    <div class="input-group">
                        <label>팀 수:</label>
                        <select id="teamCountSelect" onchange="renderTeamBoards()">
                            <option value="1">1팀</option>
                            <option value="2">2팀</option>
                            <option value="3">3팀</option>
                            <option value="4" selected>4팀</option>
                            <option value="5">5팀</option>
                            <option value="6">6팀</option>
                            <option value="7">7팀</option>
                            <option value="8">8팀</option>
                        </select>
                    </div>
                    <div class="input-group" style="margin-top: 10px;">
                        <input 입력="text" id="streamerInput" placeholder="닉네임 (쉼표로 구분)" style="flex-grow: 1;" onkeypress="if(event.key==='Enter') addStreamers()">
                        <button onclick="addStreamers()">추가</button>
                    </div>
                </div>
                
                <div class="box">
                    <h3>2. 대기실 (드래그하여 팀에 배치하세요)</h3>
                    <div id="waitingPool" ondrop="drop(event)" ondragover="allowDrop(event)">
                    </div>
                </div>
            </div>

            <div class="box">
                <h3>3. 팀 배치 <span style="font-size:0.8rem; color:#aaa; font-weight:normal;">(각 팀의 최상단 닉네임이 해당 팀의 API 검색 기준이 됩니다.)</span></h3>
                <div class="teams-container" id="teamsContainer">
                </div>
            </div>

            <div class="box">
                <h3>4. 점수판 룰 설정</h3>
                <div class="config-row">
                    <label>킬 점수: <input 입력="number" id="killScore" value="1" style="width: 60px;"></label>
                    <label>데스 감점: <input 입력="number" id="deathPenalty" value="1" style="width: 60px;"></label>
                    <label>목표 점수: <input 입력="number" id="targetScore" value="100" style="width: 80px;"></label>
                    <label>종료 시간: <input 입력="time" id="endTime"></label>
                </div>
                <div class="config-row" style="margin-top: 10px; border-top: 1px solid #333; padding-top: 10px;">
                    <span style="font-size: 0.9rem; color: #aaa; font-weight: bold;"> 🍗 치킨 점수 설정:</span>
                    <label>에/미/태/데/론/비: <input 입력="number" id="chickenA" value="20" style="width: 60px;" title="에란겔, 미라마, 태이고, 데스턴, 론도, 비켄디"></label>
                    <label>사/카/파: <input 입력="number" id="chickenB" value="15" style="width: 60px;" title="사녹, 카라킨, 파라모"></label>
                </div>
                <button class="btn-start" onclick="startGame()">🚀 팀 확정 및 대회 시작</button>
            </div>
        </div>

        <div class="box" id="matchSection" style="display:none;">
            <div style="display: flex; justify-content: space-between; align-items: flex-end; border-bottom: 1px solid #333; padding-bottom: 15px; margin-bottom: 15px;">
                <div>
                    <h3 style="margin-bottom: 5px;">진행 상황 <span id="clock" style="font-size: 1rem; color:#ffcc00; margin-left: 10px;"></span></h3>
                    <p id="systemMsg" style="margin: 0; font-size: 1.1rem; color: #ccc;">초기화 중...</p>
                </div>
                <div class="total-score-panel">
                    <span class="total-score-label">전체 팀 합계 점수</span>
                    <div class="total-score-value" id="totalScoreDisp">TOTAL 0</div>
                </div>
            </div>
            
            <div class="score-board" id="scoreBoard">
            </div>
            
            <div style="text-align: center; margin-top: 30px;">
                <button style="background: #9b59b6; margin-right: 10px;" onclick="openPipWindow()">🪟 미니 창(PiP) 띄우기</button>
                <button style="background: #e74c3c;" onclick="location.페이지를 새로고침()">🛑 설정 화면으로 돌아가기 (초기화)</button>
            </div>
        </div>
    </div>

    <script>
        const BACKEND_URL = "https://pubg-score-board.vercel.app/api"; 
        
        let teamsData = []; 
        let config = {};
        let pollingTimer, clockTimer;
        let isGameFinished = false;
        let msgTimeout;
        let pipWindow = null;
        let isFirstSync = true; // 대회 시작 이전 전적을 거르기 위한 변수

        const mapGroups = {
            groupA: ['Baltic_Main', 'Desert_Main', 'Tiger_Main', 'Kiki_Main', 'Neon_Main', 'DihorOtok_Main'],
            groupB: ['Savage_Main', 'Summerland_Main', 'Chimera_Main']
        };

        window.onload = function() {
            renderTeamBoards();
        };

        function addStreamers() {
            const inputEl = document.getElementById('streamerInput');
            const names = inputEl.value.split(',').map(n => n.trim()).filter(n => n !== "");
            const pool = document.getElementById('waitingPool');
            
            names.forEach(name => {
                const 꼬리표 = document.createElement('div');
                꼬리표.className = 'player-tag';
                꼬리표.id = 'player-' + Math.random().toString(36).substr(2, 9);
                꼬리표.draggable = true;
                꼬리표.ondragstart = drag;
                꼬리표.innerHTML = `<span class="name-text">${name}</span><span class="remove-btn" onclick="this.parentElement.remove()">✕</span>`;
                pool.appendChild(꼬리표);
            });
            inputEl.value = '';
        }

        function renderTeamBoards() {
            const count = parseInt(document.getElementById('teamCountSelect').value);
            const container = document.getElementById('teamsContainer');
            
            document.querySelectorAll('.team-dropzone .player-tag').forEach(꼬리표 => {
                document.getElementById('waitingPool').appendChild(꼬리표);
            });

            container.innerHTML = "";
            for (let i = 1; i <= count; i++) {
                const card = document.createElement('div');
                card.className = 'team-card';
                card.innerHTML = `
                    <div class="team-title">TEAM ${i}</div>
                    <div class="team-dropzone" id="teamDrop-${i}" ondrop="drop(event)" ondragover="allowDrop(event)">
                    </div>
                `;
                container.appendChild(card);
            }
        }

        function allowDrop(ev) { ev.preventDefault(); }
        function drag(ev) { ev.dataTransfer.setData("text", ev.target.id); }
        function drop(ev) {
            ev.preventDefault();
            const data = ev.dataTransfer.getData("text");
            const draggedElement = document.getElementById(data);
            let target = ev.target;
            while (target && !target.classList.contains('team-dropzone') && target.id !== 'waitingPool') {
                target = target.parentElement;
            }
            if (target && draggedElement) {
                target.appendChild(draggedElement);
            }
        }

        function startGame() {
            teamsData = [];
            const dropzones = document.querySelectorAll('.team-dropzone');
            
            dropzones.forEach((zone, index) => {
                const players = Array.from(zone.querySelectorAll('.name-text')).map(span => span.innerText);
                if (players.length > 0) {
                    teamsData.push({
                        id: index + 1,
                        name: `TEAM ${index + 1}`,
                        repPlayer: players[0],
                        lastMatchId: "", 
                        players: players.map(p => ({ name: p, kills: 0, deaths: 0, score: 0 })),
                        chickenCount: 0, // 누적 1등 횟수
                        chickenBonusTotal: 0,
                        score: 0,
                        latestUpdate: null // PiP 애니메이션용 최신 업데이트 정보
                    });
                }
            });

            if (teamsData.length === 0) {
                alert("배치된 팀원이 없습니다. 팀을 먼저 구성해주세요!");
                return;
            }

            config = {
                killScore: parseInt(document.getElementById('killScore').value),
                deathPenalty: parseInt(document.getElementById('deathPenalty').value),
                targetScore: parseInt(document.getElementById('targetScore').value),
                endTime: document.getElementById('endTime').value,
                chickenA: parseInt(document.getElementById('chickenA').value),
                chickenB: parseInt(document.getElementById('chickenB').value)
            };

            if (!config.endTime) {
                alert("종료 시간을 입력해주세요.");
                return;
            }

            document.getElementById('builderSection').style.display = 'none';
            document.getElementById('matchSection').style.display = 'block';
            
            isFirstSync = true;
            document.getElementById('systemMsg').innerHTML = `🔄 현재 시점의 기준 전적을 설정 중입니다...`;
            
            renderLiveScoreBoard();
            clockTimer = setInterval(checkTimeLimit, 1000);
            
            // 시작과 동시에 기준점(Baseline) 세팅을 위한 1회 통신
            fetchData(); 
            pollingTimer = setInterval(fetchData, 60000); 
        }

        function checkTimeLimit() {
            if (isGameFinished) return;
            const 지금 = new Date();
            const currentTimeStr = 지금.getHours().toString().padStart(2, '0') + ":" + 지금.getMinutes().toString().padStart(2, '0');
            document.getElementById('clock').innerText = "현재 시간: " + currentTimeStr + " / 종료 시간: " + config.endTime;

            if (currentTimeStr >= config.endTime) {
                endGame(false);
            }
            if (pipWindow) renderLiveScoreBoard();
        }

        function showTemporaryMessage(msg) {
            const msgEl = document.getElementById('systemMsg');
            msgEl.innerHTML = `<span style="color:#f1c40f; font-weight:bold;">${msg}</span>`;
            
            clearTimeout(msgTimeout);
            msgTimeout = setTimeout(() => {
                if (!isGameFinished) {
                    msgEl.innerHTML = "데이터 갱신 대기 중...";
                }
            }, 5000);
        }

        async function fetchData() {
            if (isGameFinished) return;
            let updatedTeams = [];
            let fetchedAny = false;

            for (let team of teamsData) {
                if (!team.repPlayer) continue;
                try {
                    const res = await fetch(`${BACKEND_URL}?player=${team.repPlayer}&lastMatch=${team.lastMatchId}`);
                    const data = await res.json();
                    
                    fetchedAny = true;

                    // 첫 통신 시: 점수를 계산하지 않고 시작점(Match ID)만 저장합니다.
                    if (isFirstSync) {
                        team.lastMatchId = data.matchId || ""; 
                    } 
                    // 두 번째 이후 통신: 새로운 매치가 잡혔을 때만 계산
                    else if (data.status === "new_match") {
                        team.lastMatchId = data.matchId;
                        const matchMap = data.map || ""; 
                        calculateScores(team, data.stats, matchMap);
                        updatedTeams.push(team.name);
                    }
                } catch (error) { console.error(error); }
            }

            // 기준점 세팅 완료 처리
            if (isFirstSync && fetchedAny) {
                isFirstSync = false;
                document.getElementById('systemMsg').innerHTML = `<span style="color:#00ff00;">✅ 기준 전적 수집 완료. 새로운 전적을 대기합니다.</span>`;
            } else if (!isFirstSync && updatedTeams.length > 0) {
                showTemporaryMessage(`${updatedTeams.join(', ')} 의 매치 종료! 최신 점수를 반영했습니다.`);
            }
        }

        function calculateScores(team, stats, matchMap) {
            let teamWonMatch = false;
            let teamBestRank = 99; // 현재 매치 최고 등수 계산용
            let oldTotalScore = team.score; // 점수 변동량 계산용

            team.players.forEach(playerObj => {
                const matchedKey = Object.keys(stats).find(key => key.toLowerCase() === playerObj.name.toLowerCase());
                if (matchedKey) {
                    const s = stats[matchedKey];
                    const earned = (s.kills * config.killScore) - (s.deaths * config.deathPenalty);
                    
                    if (s.winPlace && s.winPlace < teamBestRank) teamBestRank = s.winPlace;

                    playerObj.kills += s.kills;
                    playerObj.deaths += s.deaths;
                    playerObj.score += earned;
                    team.score += earned;
                    if (s.isWinner) teamWonMatch = true;
                }
            });

            if (teamWonMatch) {
                team.chickenCount += 1;
                let chickenBonus = mapGroups.groupB.includes(matchMap) ? config.chickenB : config.chickenA;
                team.chickenBonusTotal += chickenBonus;
                team.score += chickenBonus;
            }

            // 이번 라운드 변경 사항 애니메이션용 데이터 저장
            let scoreDiff = team.score - oldTotalScore;
            team.latestUpdate = { rank: teamBestRank, diff: scoreDiff, timestamp: Date.지금() };

            renderLiveScoreBoard();
            checkTargetScore();
        }

        function checkTargetScore() {
            const winner = teamsData.find(t => t.score >= config.targetScore);
            if (winner) endGame(true, winner.name);
        }

        function endGame(isSuccess, winnerName = "") {
            isGameFinished = true;
            clearInterval(pollingTimer);
            clearInterval(clockTimer);
            clearTimeout(msgTimeout);
            const msgEl = document.getElementById('systemMsg');
            if (isSuccess) msgEl.innerHTML = `<span class="status">🎉 대회 종료! ${winnerName} 팀이 목표 점수를 달성했습니다!</span>`;
            else msgEl.innerHTML = `<span class="failed">⏰ 시간 종료! 목표 점수에 도달한 팀이 없습니다.</span>`;
            if (pipWindow) renderLiveScoreBoard();
        }

        async function openPipWindow() {
            if (!('documentPictureInPicture' in window)) {
                alert("PiP 기능을 지원하지 않는 브라우저입니다.");
                return;
            }
            pipWindow = await documentPictureInPicture.requestWindow({ width: 340, height: 600 });
            
            // 애니메이션을 위한 CSS 주입
            const style = document.createElement('style');
            style.textContent = `
                @keyframes popFade {
                    0% { transform: scale(0.5); opacity: 0; }
                    10% { transform: scale(1.1); opacity: 1; pointer-events: auto; }
                    20% { transform: scale(1); opacity: 1; pointer-events: auto; }
                    80% { transform: scale(1); opacity: 1; pointer-events: auto; }
                    100% { transform: scale(0.9); opacity: 0; pointer-events: none; display: none; }
                }
                .pip-update-anim {
                    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
                    background: rgba(0, 0, 0, 0.9);
                    border-radius: 10px;
                    display: flex; flex-direction: column; justify-content: center; align-items: center;
                    animation: popFade 5s forwards;
                    z-index: 10;
                }
                .pip-rank { font-size: 3.5rem; color: #f1c40f; font-weight: 900; text-shadow: 0 0 15px rgba(241, 196, 15, 0.6); margin-bottom: 5px; line-height: 1; }
                .pip-diff { font-size: 2rem; color: #2ecc71; font-weight: bold; }
                .live-team-card { position: relative; }
            `;
            pipWindow.document.head.appendChild(style);

            [...document.styleSheets].forEach(styleSheet => {
                try {
                    const cssRules = [...styleSheet.cssRules].map(rule => rule.cssText).join('');
                    const s = document.createElement('style');
                    s.textContent = cssRules;
                    pipWindow.document.head.appendChild(s);
                } catch (e) {}
            });

            pipWindow.document.body.style.background = "#121417";
            const container = document.createElement('div');
            container.id = 'pipContent';
            pipWindow.document.body.appendChild(container);
            pipWindow.addEventListener("pagehide", () => { pipWindow = null; });
            
            renderLiveScoreBoard();
        }

        function renderLiveScoreBoard() {
            const board = document.getElementById('scoreBoard');
            const clockText = document.getElementById('clock').innerText;
            let generatedHtml = "";
            let totalMatchScore = 0;

            teamsData.forEach(team => {
                totalMatchScore += team.score;
                let playersHtml = team.players.map(p => `
                    <div class="player-stats-row">
                        <span class="player-stats-name">${p.name}</span>
                        <span>${p.kills}K / ${p.deaths}D <span class="player-stats-score">(${p.score}점)</span></span>
                    </div>
                `).join('');
                
                // 팀 치킨 카운트 하단 표시
                let chickenHtml = `<span class="chicken-bonus-text">총 ${team.chickenCount}치킨 (보너스: ${team.chickenBonusTotal}점)</span>`;
                
                // PiP 전용 애니메이션 오버레이 생성 (5초 이내 업데이트가 있었을 경우)
                let pipAnimOverlay = "";
                if (team.latestUpdate && (Date.지금() - team.latestUpdate.timestamp < 5000)) {
                    let sign = team.latestUpdate.diff >= 0 ? "+" : "";
                    let diffColor = team.latestUpdate.diff >= 0 ? "#2ecc71" : "#e74c3c";
                    pipAnimOverlay = `
                        <div class="pip-update-anim">
                            <div class="pip-rank">${team.latestUpdate.rank}등!</div>
                            <div class="pip-diff" style="color: ${diffColor};">${sign}${team.latestUpdate.diff}점</div>
                        </div>
                    `;
                }

                generatedHtml += `
                    <div class="live-team-card">
                        ${pipAnimOverlay}
                        <h4>${team.name}</h4>
                        <h2>${team.score} 점</h2>
                        <div style="margin-top: 15px; text-align: left; background: #1a1c20; padding: 10px; border-radius: 8px;">
                            ${playersHtml}
                            ${chickenHtml}
                        </div>
                    </div>
                `;
            });

            board.innerHTML = generatedHtml;
            document.getElementById('totalScoreDisp').innerText = `TOTAL ${totalMatchScore}`;

            if (pipWindow) {
                const pipContent = pipWindow.document.getElementById('pipContent');
                if (pipContent) {
                    pipContent.innerHTML = `
                        <div style="text-align: center; margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px solid #333;">
                            <h3 style="color: #f1c40f; margin: 0 0 5px 0;">PUBG 실시간 점수판</h3>
                            <div style="font-size: 0.8rem; color: #ffcc00; margin-bottom: 5px;">${clockText}</div>
                            <div style="font-size: 1.8rem; font-weight: 900; color: #f06414;">TOTAL ${totalMatchScore}</div>
                        </div>
                        <div style="display: flex; flex-direction: column; gap: 15px; padding: 10px;">${generatedHtml}</div>
                    `;
                }
            }
        }
    </script>
</body>
</html>
